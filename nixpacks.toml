[phases.setup]
nixPkgs = ["python312", "nodejs", "libgomp"]

[phases.install]
cmds = [
    "pip install -r requirements.txt",
    "if [ -d \"frontend\" ]; then cd frontend && npm install; fi"
]

[phases.build]
cmds = [
    "if [ -d \"frontend\" ]; then cd frontend && npm run build; fi"
]

[start]
cmd = "bash start.sh"
# Set SERVICE_TYPE="backend" or "frontend" in Railway environment variables
