[phases.setup]
nixPkgs = ["python312", "nodejs_20", "libgomp"]

[phases.install]
cmds = [
    "pip install -r requirements.txt",
    "cd frontend && npm install --production=false"
]

[phases.build]
cmds = [
    "cd frontend && npm run build",
    "mkdir -p frontend_dist && (cp -r frontend/out/* frontend_dist/ || cp -r out/* frontend_dist/ || true)"
]

[start]
cmd = "bash start.sh"
