[phases.setup]
nixPkgs = ["python312", "nodejs_20", "libgomp"]

[phases.install]
cmds = [
    "pip install -r requirements.txt",
    "cd frontend && npm install --production=false"
]

[phases.build]
cmds = [
    "echo '🚀 Building Frontend...'",
    "cd frontend && npm run build"
]

[start]
cmd = "bash start.sh"
