[phases.setup]
nixPkgs = ["python312", "nodejs", "libgomp"]

[phases.install]
cmds = [
    "if [ -d \"backend\" ]; then cd backend && pip install -r requirements.txt; elif [ -f \"requirements.txt\" ]; then pip install -r requirements.txt; fi",
    "if [ -d \"frontend\" ]; then cd frontend && npm install; fi"
]

[phases.build]
cmds = [
    "if [ -d \"frontend\" ]; then cd frontend && npm run build; fi"
]

[start]
cmd = "bash start.sh"
