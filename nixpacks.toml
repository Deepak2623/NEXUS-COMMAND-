[phases.setup]
nixPkgs = ["python312", "nodejs_20", "libgomp"]

[phases.install]
cmds = [
    "pip install -r requirements.txt",
    "cd frontend && npm install --production=false"
]

[phases.build]
cmds = [
    "echo '🚀 Building Frontend...'",
    "cd frontend && npm run build",
    "echo '✅ Frontend Build Complete. Found out/: $(ls -d frontend/out 2>/dev/null || echo \"NOT FOUND\")'",
    "ls -R frontend/out | head -n 10" 
]

[start]
cmd = "bash start.sh"
